<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Sacramento&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #e8dbfc 100%);
            overflow: hidden;
            position: relative;
        }

        /* Musik Control UI */
        .music-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
            z-index: 100;
            transition: all 0.3s ease;
        }
        .music-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.9);
        }

        /* Animasi Background Heart */
        .bg-heart {
            position: absolute;
            color: rgba(255, 75, 120, 0.2);
            animation: floatUp linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Card */
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(233, 115, 172, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-family: 'Sacramento', cursive;
            font-size: 3.5rem;
            color: #d946ef;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            color: #6b7280;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 60px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background: linear-gradient(45deg, #ff4b78, #ff758c);
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(255, 75, 120, 0.4);
        }

        #noBtn {
            background: linear-gradient(45deg, #a855f7, #c084fc);
            color: white;
            position: absolute;
            transition: left 0.2s ease, top 0.2s ease, transform 0.1s ease;
        }

        /* Efek Goyang untuk tombol tidak */
        .shake {
            animation: shakeEffect 0.3s ease;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }

        /* Success State */
        .hidden {
            display: none !important;
        }

        .success-title {
            font-size: 2rem;
            color: #ff4b78;
            font-weight: 700;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Hati Jatuh saat sukses */
        .rain-heart {
            position: absolute;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 5;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <button class="music-btn" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span> <span id="musicText">Putar Musik</span>
    </button>
    <audio id="romanticMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div class="container" id="mainCard">
        <div id="questionState">
            <h1>Hai kamu ❤️</h1>
            <p>Aku punya pertanyaan...<br><strong>Mau gak jadi pacarku?</strong></p>
            <div class="btn-group">
                <button id="yesBtn" onclick="acceptLove()">YES ❤️</button>
                <button id="noBtn" onmouseenter="moveButton()" onclick="moveButton()">TIDAK 😭</button>
            </div>
        </div>

        <div id="successState" class="hidden">
            <h2 class="success-title">YEAY ❤️ AKU SENENG BANGET!</h2>
            <p style="margin-top: 15px; margin-bottom: 0;">I Love You! ✨</p>
        </div>
    </div>

    <script>
        // --- 1. Animasi Background Love Melayang ---
        const heartIcons = ['❤️', '💖', '💝', '💕', '🔮', '✨'];
        function createBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            
            // Atur posisi dan ukuran random
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // 4s sampai 7s
            
            document.body.appendChild(heart);
            
            // Hapus element setelah animasi selesai
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }
        setInterval(createBgHeart, 300);

        // --- 2. Musik Player ---
        const music = document.getElementById('romanticMusic');
        const musicText = document.getElementById('musicText');
        const musicIcon = document.getElementById('musicIcon');

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(e => console.log("Audio autoplay diblokir browser, butuh interaksi user."));
                musicText.innerText = "Matikan Musik";
                musicIcon.innerText = "⏸️";
            } else {
                music.pause();
                musicText.innerText = "Putar Musik";
                musicIcon.innerText = "🎵";
            }
        }

        // --- 3. Interaksi Tombol "TIDAK" ---
        const noBtn = document.getElementById('noBtn');
        let scale = 1;

        // Inisialisasi posisi awal tombol TIDAK agar sifat absolutnya berada di kanan tombol YES
        noBtn.style.left = "calc(50% + 15px)";

        function moveButton() {
            // Efek mengecil setiap kali didekati/ditekan
            if (scale > 0.4) {
                scale -= 0.1;
                noBtn.style.transform = `scale(${scale})`;
            }

            // Tambahkan efek bergoyang saat menghindar
            noBtn.classList.add('shake');
            setTimeout(() => noBtn.classList.remove('shake'), 300);

            // Hitung koordinat random di seluruh area layar browser
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // Pastikan koordinat tidak bernilai negatif
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // Pindahkan tombol ke koordinat random di body (karena absolut)
            document.body.appendChild(noBtn);
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // --- 4. Aksi Saat Tombol "YES" Ditekan ---
        function acceptLove() {
            // Sembunyikan pertanyaan, munculkan pesan sukses
            document.getElementById('questionState').classList.add('hidden');
            document.getElementById('successState').classList.remove('hidden');
            
            // Hapus tombol tidak agar tidak menggangu layar lagi
            noBtn.remove();

            // Jalankan hujan hati dan efek confetti luar ruangan
            for (let i = 0; i < 100; i++) {
                setTimeout(createRainHeart, i * 50);
            }
        }

        // --- 5. Efek Hati Berjatuhan (Sukses) ---
        function createRainHeart() {
            const heart = document.createElement('div');
            heart.classList.add('rain-heart');
            
            const types = ['❤️', '💖', '🌸', '✨', '💘'];
            heart.innerText = types[Math.floor(Math.random() * types.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            heart.style.animationHTMLDuration = Math.random() * 2 + 2 + 's';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    </script>
</body>
</html>
